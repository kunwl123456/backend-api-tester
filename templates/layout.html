<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend API Tester</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3348;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e2e8f0;
      --text2: #8892a4;
      --danger: #f56565;
      --success: #48bb78;
      --warning: #f6ad55;
      --radius: 10px;
      --font: 'SF Mono', 'Fira Code', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; display: flex; min-height: 100vh; }

    /* Sidebar */
    nav { width: 220px; min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; position: sticky; top: 0; }
    .nav-logo { padding: 0 20px 24px; font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    .nav-logo span { color: var(--accent2); }
    .nav-section { padding: 16px 20px 4px; font-size: 10px; letter-spacing: 2px; color: var(--text2); text-transform: uppercase; }
    nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--text2); text-decoration: none; transition: all .2s; border-left: 3px solid transparent; }
    nav a:hover, nav a.active { color: var(--text); background: var(--surface2); border-left-color: var(--accent); }
    nav a .icon { font-size: 16px; }

    /* Main */
    main { flex: 1; padding: 32px; overflow-y: auto; }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .page-subtitle { color: var(--text2); margin-bottom: 28px; font-size: 13px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--text2); letter-spacing: .5px; }
    input, textarea, select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 9px 12px; font-family: var(--font); font-size: 13px;
      outline: none; transition: border .2s; width: 100%;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; border-radius: 6px; border: none; font-family: var(--font); font-size: 13px; cursor: pointer; transition: all .2s; font-weight: 600; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5a52e0; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

    /* Response area */
    .response-box { background: #0a0c14; border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-top: 16px; min-height: 60px; }
    .response-box pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; line-height: 1.7; color: #a8d8a8; }
    .response-status { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
    .status-ok { color: var(--success); }
    .status-err { color: var(--danger); }

    /* Badge */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-blue { background: rgba(108,99,255,.2); color: var(--accent); }
    .badge-green { background: rgba(72,187,120,.2); color: var(--success); }
    .badge-orange { background: rgba(246,173,85,.2); color: var(--warning); }
    .badge-red { background: rgba(245,101,101,.2); color: var(--danger); }

    /* Loading */
    .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }

    /* Steps */
    .steps { display: flex; gap: 0; margin-bottom: 20px; }
    .step { flex: 1; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text2); }
    .step:first-child { border-radius: 6px 0 0 6px; }
    .step:last-child { border-radius: 0 6px 6px 0; }
    .step.active { background: rgba(108,99,255,.15); border-color: var(--accent); color: var(--text); }
    .step.done { background: rgba(72,187,120,.1); border-color: var(--success); color: var(--success); }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Chat */
    .chat-window { background: #0a0c14; border: 1px solid var(--border); border-radius: 6px; padding: 16px; min-height: 200px; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; }
    .msg-user { flex-direction: row-reverse; }
    .msg-bubble { padding: 10px 14px; border-radius: 10px; max-width: 70%; font-size: 13px; line-height: 1.6; }
    .msg-user .msg-bubble { background: rgba(108,99,255,.25); color: var(--text); }
    .msg-npc .msg-bubble { background: var(--surface2); color: var(--text); }
    .msg-label { font-size: 10px; color: var(--text2); margin-bottom: 4px; }
    .msg-user .msg-label { text-align: right; }

    /* Alert */
    .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .alert-info { background: rgba(108,99,255,.1); border: 1px solid rgba(108,99,255,.3); color: var(--accent); }
    .alert-success { background: rgba(72,187,120,.1); border: 1px solid rgba(72,187,120,.3); color: var(--success); }
    .alert-error { background: rgba(245,101,101,.1); border: 1px solid rgba(245,101,101,.3); color: var(--danger); }

    /* Image preview */
    .img-preview { max-width: 200px; border-radius: 8px; margin-top: 12px; border: 2px solid var(--border); }

    /* Misc */
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .text-muted { color: var(--text2); }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--accent2); }

    @media (max-width: 768px) {
      nav { width: 60px; }
      .nav-logo, .nav-section, nav a span { display: none; }
      nav a { justify-content: center; padding: 12px; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">API<span>Tester</span></div>
    <div class="nav-section">基础</div>
    <a href="/" class="{{if eq .Page "index"}}active{{end}}"><span class="icon">⚙️</span><span>配置</span></a>
    <div class="nav-section">测试模块</div>
    <a href="/character" class="{{if eq .Page "character"}}active{{end}}"><span class="icon">🧙</span><span>创角</span></a>
    <a href="/quest" class="{{if eq .Page "quest"}}active{{end}}"><span class="icon">📜</span><span>任务生成</span></a>
    <a href="/dialogue" class="{{if eq .Page "dialogue"}}active{{end}}"><span class="icon">💬</span><span>对话</span></a>
    <a href="/announcement" class="{{if eq .Page "announcement"}}active{{end}}"><span class="icon">📢</span><span>公告</span></a>
    <a href="/item" class="{{if eq .Page "item"}}active{{end}}"><span class="icon">🗡️</span><span>道具生成</span></a>
  </nav>
