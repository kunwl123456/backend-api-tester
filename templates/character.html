<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创角测试 — Backend API Tester</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <div class="nav-logo">API<span>Tester</span></div>
    <div class="nav-section">基础</div>
    <a href="/"><span class="icon">⚙️</span><span>配置</span></a>
    <div class="nav-section">测试模块</div>
    <a href="/character" class="active"><span class="icon">🧙</span><span>创角</span></a>
    <a href="/quest"><span class="icon">📜</span><span>任务生成</span></a>
    <a href="/dialogue"><span class="icon">💬</span><span>对话</span></a>
    <a href="/announcement"><span class="icon">📢</span><span>公告</span></a>
    <a href="/item"><span class="icon">🗡️</span><span>道具生成</span></a>
  </nav>
  <main>
    <div class="page-title">🧙 创角测试</div>
    <div class="page-subtitle">完整测试两阶段创角流程：阶段一生成角色数据，阶段二生成角色图片</div>

    <!-- 流程步骤 -->
    <div class="steps" id="steps">
      <div class="step active" id="step1"><span class="step-num">①</span>填写角色信息</div>
      <div class="step" id="step2"><span class="step-num">②</span>生成角色 (等待 CREATE)</div>
      <div class="step" id="step3"><span class="step-num">③</span>触发生图</div>
      <div class="step" id="step4"><span class="step-num">④</span>等待生图完成</div>
      <div class="step" id="step5"><span class="step-num">✓</span>完成</div>
    </div>

    <!-- 阶段一：创建 -->
    <div class="card" id="card-create">
      <div class="card-title">阶段一：创建角色</div>
      <div class="form-grid">
        <div class="form-group">
          <label>角色名称 *</label>
          <input type="text" id="char-name" placeholder="艾拉">
        </div>
        <div class="form-group">
          <label>性别 *</label>
          <select id="char-gender">
            <option value="female">女</option>
            <option value="male">男</option>
          </select>
        </div>
        <div class="form-group full">
          <label>背景故事</label>
          <textarea id="char-bg" placeholder="她是一名来自北方雪原的猎人，擅长弓术..."></textarea>
        </div>
        <div class="form-group full">
          <label>附加信息</label>
          <input type="text" id="char-info" placeholder="可选的附加描述">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" onclick="checkName()">🔍 检查名称</button>
        <button class="btn btn-primary" id="btn-create" onclick="createCharacter()">🚀 开始创建</button>
        <span id="create-spinner" style="display:none"><span class="spinner"></span> 处理中...</span>
      </div>
      <div id="create-result"></div>
    </div>

    <!-- 阶段二：生图 -->
    <div class="card" id="card-gen" style="opacity:.4;pointer-events:none">
      <div class="card-title">阶段二：生成角色图片</div>
      <div class="alert alert-info" id="gen-guide">等待阶段一完成后可触发生图</div>
      <div id="char-preview"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-gen" onclick="generateImage()">🎨 触发生图</button>
        <span id="gen-spinner" style="display:none"><span class="spinner"></span> 生图中（约2分钟）...</span>
      </div>
      <div id="gen-result"></div>
    </div>

    <!-- 角色列表 -->
    <div class="card">
      <div class="card-title">我的角色列表</div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="loadCharList()">🔄 刷新列表</button>
      </div>
      <div id="char-list" class="mt-16"></div>
    </div>
  </main>

  <script>
    let currentCharId = null;

    function setStep(n) {
      for (let i = 1; i <= 5; i++) {
        const el = document.getElementById('step' + i);
        el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
      }
    }

    function showResult(id, ok, data) {
      const el = document.getElementById(id);
      if (ok) {
        el.innerHTML = `<div class="alert alert-success mt-8">✅ 成功</div><div class="response-box"><pre class="json-view">${JSON.stringify(data, null, 2)}</pre></div>`;
      } else {
        el.innerHTML = `<div class="alert alert-error mt-8">❌ 失败</div><div class="response-box"><pre class="json-view">${JSON.stringify(data, null, 2)}</pre></div>`;
      }
    }

    async function checkName() {
      const name = document.getElementById('char-name').value;
      if (!name) return alert('请先输入角色名称');
      const fd = new FormData(); fd.append('name', name);
      const res = await fetch('/api/character/check-name', { method: 'POST', body: fd });
      const data = await res.json();
      showResult('create-result', res.ok && data.check_result, data);
    }

    async function createCharacter() {
      const name = document.getElementById('char-name').value;
      if (!name) return alert('角色名称不能为空');
      document.getElementById('btn-create').disabled = true;
      document.getElementById('create-spinner').style.display = 'inline';
      setStep(2);

      const fd = new FormData();
      fd.append('name', name);
      fd.append('gender', document.getElementById('char-gender').value);
      const bg = document.getElementById('char-bg').value;
      if (bg) fd.append('backgroundstory', bg);
      const info = document.getElementById('char-info').value;
      if (info) fd.append('information', info);

      const res = await fetch('/api/character/create', { method: 'POST', body: fd });
      const data = await res.json();
      document.getElementById('create-spinner').style.display = 'none';

      if (!res.ok || !data.character_id) {
        showResult('create-result', false, data);
        document.getElementById('btn-create').disabled = false;
        setStep(1);
        return;
      }
      currentCharId = data.character_id;
      showResult('create-result', true, data);

      // Poll for CREATE stage
      showResult('create-result', true, { ...data, _status: '轮询中，等待 stage=CREATE...' });
      setStep(2);
      await pollCharacter('CREATE');
    }

    async function pollCharacter(expectStage) {
      if (!currentCharId) return;
      const res = await fetch(`/api/character/poll?character_id=${currentCharId}&expect_stage=${expectStage}`);
      const data = await res.json();

      if (!res.ok) {
        showResult('create-result', false, data);
        document.getElementById('btn-create').disabled = false;
        return;
      }

      if (expectStage === 'CREATE') {
        showResult('create-result', true, data);
        setStep(3);
        // Enable stage 2
        document.getElementById('card-gen').style.opacity = '1';
        document.getElementById('card-gen').style.pointerEvents = 'auto';
        document.getElementById('gen-guide').innerHTML = `✅ 角色 <code>${currentCharId}</code> 已创建完成，点击下方按钮触发生图`;
        renderCharPreview(data, false);
      } else if (expectStage === 'GEN') {
        showResult('gen-result', true, data);
        setStep(5);
        renderCharPreview(data, true);
        document.getElementById('gen-spinner').style.display = 'none';
      }
    }

    function renderCharPreview(data, showImg) {
      const el = document.getElementById('char-preview');
      const imgUrl = data.image_url || data.icon_url || (data.assets && data.assets[0]) || '';
      el.innerHTML = `
        <div class="char-card">
          ${imgUrl && showImg ? `<img src="${imgUrl}" alt="角色图片" onerror="this.style.display='none'">` : '<div style="width:80px;height:80px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px">🧙</div>'}
          <div class="char-info">
            <div class="char-name">${data.name || data.character_name || '未知'}</div>
            <div class="char-stage mt-8"><span class="badge ${data.stage === 'GEN' ? 'badge-green' : 'badge-orange'}">Stage: ${data.stage || '?'}</span></div>
            <div class="char-attrs mt-8">
              ${data.gender ? `<span class="char-attr">性别: ${data.gender}</span>` : ''}
              ${data.character_id ? `<span class="char-attr">ID: ${data.character_id}</span>` : ''}
            </div>
          </div>
        </div>`;
    }

    async function generateImage() {
      if (!currentCharId) return alert('请先完成阶段一');
      document.getElementById('btn-gen').disabled = true;
      document.getElementById('gen-spinner').style.display = 'inline';
      setStep(4);

      const fd = new FormData();
      fd.append('character_id', currentCharId);
      const res = await fetch('/api/character/generate', { method: 'POST', body: fd });
      const data = await res.json();

      if (!res.ok) {
        showResult('gen-result', false, data);
        document.getElementById('btn-gen').disabled = false;
        document.getElementById('gen-spinner').style.display = 'none';
        return;
      }
      showResult('gen-result', true, { ...data, _status: '轮询中，等待 stage=GEN...' });
      await pollCharacter('GEN');
    }

    async function loadCharList() {
      const res = await fetch('/api/character/list');
      const data = await res.json();
      const el = document.getElementById('char-list');
      if (!res.ok) {
        el.innerHTML = `<div class="alert alert-error">${data.error || JSON.stringify(data)}</div>`;
        return;
      }
      const chars = Array.isArray(data) ? data : (data.data || data.characters || []);
      if (!chars.length) {
        el.innerHTML = `<div class="text-muted text-sm">暂无角色</div>`;
        return;
      }
      el.innerHTML = chars.map(c => `
        <div class="char-card" style="cursor:pointer" onclick="selectChar('${c.character_id || c.id}')">
          ${c.image_url ? `<img src="${c.image_url}" alt="" onerror="this.style.display='none'">` : '<div style="width:80px;height:80px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px">🧙</div>'}
          <div class="char-info">
            <div class="char-name">${c.name || c.character_name || '未命名'}</div>
            <div class="char-stage mt-8"><span class="badge ${c.stage === 'GEN' ? 'badge-green' : 'badge-orange'}">Stage: ${c.stage || '?'}</span></div>
            <div class="text-sm text-muted mt-8">${c.character_id || c.id || ''}</div>
          </div>
        </div>`).join('');
    }

    function selectChar(id) {
      currentCharId = id;
      document.getElementById('card-gen').style.opacity = '1';
      document.getElementById('card-gen').style.pointerEvents = 'auto';
      document.getElementById('gen-guide').innerHTML = `已选择角色 <code>${id}</code>，可直接触发生图或查询`;
    }
  </script>
</body>
</html>
